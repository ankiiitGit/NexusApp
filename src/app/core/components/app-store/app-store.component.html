<app-header [userImg]="userProfileImg"></app-header>
<br>
<div class="min-h-screen bg-gradient-to-br from-blue-100 via-purple-100 to-blue-300 py-10">
    <div class="flex justify-center">
        <h2 class="text-4xl font-extrabold mb-8 text-center text-blue-950 tracking-tight">App Store</h2>
    </div>
    <div class="flex justify-center">
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-10 max-w-6xl w-full">
            <div *ngFor="let app of apps"
                class="relative overflow-hidden rounded-lg shadow-lg flex flex-col justify-end cursor-pointer transition-transform hover:scale-105"
                style="min-height: 260px; background: linear-gradient(135deg, #e0e7ff 0%, #f0fdfa 100%);"
                (click)="launchApp(app.name.toLowerCase())">
                <!-- Pattern overlay -->
                <div class="absolute inset-0 opacity-30 pointer-events-none"
                    style="background-image: url('/assets/app-bg-pattern.png'); background-size: cover; background-position: center;">
                </div>
                <!-- App icon as background -->
                <div class="absolute inset-0 z-0"
                    [ngStyle]="{
                        'background-image': app.iconUrl && app.iconUrl.trim() ? 'url(/' + app.iconUrl + ')' : 'url(/breakingNews.jpeg)',
                        'background-size': 'cover',
                        'background-position': 'center',
                        'opacity': '0.7'
                    }">
                </div>
                <!-- Transparent overlay for text -->
                <div class="absolute inset-0 z-10 flex flex-col justify-end">
                    <div class="bg-white/60 backdrop-blur-sm p-6 rounded-b-lg">
                        <span class="text-2xl font-extrabold text-blue-950 drop-shadow mb-1">{{ app.name }}</span>
                        <p class="text-base font-medium text-gray-800 mt-2 mb-2 drop-shadow">{{ app.description| description:35}}</p>
                        <div class="flex justify-between items-center mt-3">
                            <span class="text-green-600 text-sm font-semibold">#Application</span>
                            <span class="text-blue-700 hover:text-blue-900 transition">
                                <i class="fa fa-2x fa-chevron-circle-down" aria-hidden="true"></i>
                            </span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<app-footer></app-footer>

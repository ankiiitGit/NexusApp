<!-- Make the top border thinner and softer for a more mature look -->
<footer class="h-[70px] bg-blue-950 flex items-center justify-between px-10 text-neutral-200 text-sm border-t border-blue-800 shadow-lg animate-fadeIn">
    <!-- Left: Logo and Copyright -->
    <div class="flex items-center gap-4 animate-slideInLeft">
        <!-- <img width="90" src="/logo.png" alt="onecognizant-logo"> -->
        <span class="font-semibold tracking-wide">&copy; {{ currentYear }} One Cognizant. All rights reserved.</span>
    </div>
    <!-- Center: Quick Links with underline animation -->
    <ul class="flex gap-8">
        <li>
            <a [routerLink]="'/about'" class="relative hover:text-blue-400 transition-colors duration-300 after:content-[''] after:block after:h-0.5 after:bg-blue-400 after:scale-x-0 hover:after:scale-x-100 after:transition-transform after:duration-300 after:origin-left px-2">
                About
            </a>
        </li>
        <li>
            <a [routerLink]="'/help'" class="relative hover:text-blue-400 transition-colors duration-300 after:content-[''] after:block after:h-0.5 after:bg-blue-400 after:scale-x-0 hover:after:scale-x-100 after:transition-transform after:duration-300 after:origin-left px-2">
                Help
            </a>
        </li>
        <li>
            <a [routerLink]="'/contact'" class="relative hover:text-blue-400 transition-colors duration-300 after:content-[''] after:block after:h-0.5 after:bg-blue-400 after:scale-x-0 hover:after:scale-x-100 after:transition-transform after:duration-300 after:origin-left px-2">
                Contact
            </a>
        </li>
    </ul>
    <!-- Right: Organization Info with fade-in -->
    <div class="flex items-center gap-2 animate-slideInRight">
        <span class="text-xs opacity-80">Powered by</span>
        <img width="80" src="/logo.png" alt="Cognizant" class="transition-transform duration-500 hover:scale-105">
    </div>
</footer>

<style>
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px);}
  to { opacity: 1; transform: translateY(0);}
}
@keyframes slideInLeft {
  from { opacity: 0; transform: translateX(-40px);}
  to { opacity: 1; transform: translateX(0);}
}
@keyframes slideInRight {
  from { opacity: 0; transform: translateX(40px);}
  to { opacity: 1; transform: translateX(0);}
}
.animate-fadeIn { animation: fadeIn 0.8s ease; }
.animate-slideInLeft { animation: slideInLeft 0.8s ease; }
.animate-slideInRight { animation: slideInRight 0.8s ease; }
</style>

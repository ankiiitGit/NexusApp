<header class="h-[61px] z-10 bg-blue-950 sticky top-0 flex items-center justify-between px-10">
<!-- Logo and Navigation -->
 <div class="flex gap-5">
    <img width="110" src="/logo.png" alt="onecognizant-logo">
    <ul class="flex items-center" *ngFor="let item of navList">
      <li class="text-neutral-200 cursor-pointer text-sm font-bold hover:text-blue-400 transition-[1s]">
         <a [routerLink]="item.route" class="block w-full h-full">{{item.name}}</a>
      </li>
    </ul>
 </div>
<!-- Welcome User | Profile Image | SignOut -->
 <div class="text-white flex items-center gap-4">
   <div class="flex items-center gap-2">
     <a href="/"><span>Welcome <strong>Ashish</strong></span></a>
     <img [src]="userImg" width="42" alt="user-img">
   </div>
   &nbsp; | &nbsp;
   <a class="cursor-pointer hover:text-blue-400 transition-[1s]" (click)="auth.signOut()">Signout</a>
 </div>
</header>

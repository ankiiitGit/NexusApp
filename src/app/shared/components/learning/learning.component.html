<app-header [userImg]="userProfileImg"></app-header>
<br>
<div class="fullscreen-bg">
    <div class="learning-container">
        <header class="learning-header">
            <button type="button" class="back-btn" (click)="goToAppStore()">
                &#8592; Back
            </button>
            <h2>My Learning</h2>
            <span class="header-spacer"></span>
        </header>

        <div class="course-list" *ngIf="courses.length > 0; else noCourses">
            <div class="course-card" *ngFor="let course of courses">
                <div class="course-card-header">
                    <h3>{{ course.title }}</h3>
                    <span class="status" [ngClass]="getStatusClass(course.status)">{{ course.status }}</span>
                </div>
                <div class="course-details">
                    <div>
                        <span class="label">Instructor:</span>
                        <span>{{ course.instructor }}</span>
                    </div>
                    <div>
                        <span class="label">Duration:</span>
                        <span>{{ course.duration }}</span>
                    </div>
                </div>
                <div class="progress-bar">
                    <div class="progress" [style.width.%]="course.progress"></div>
                </div>
                <div class="actions">
                    <button *ngIf="course.status === 'Not Started'" (click)="startCourse(course)">Start</button>
                    <button *ngIf="course.status === 'In Progress'" (click)="markCompleted(course)">Mark as Completed</button>
                </div>
            </div>
        </div>

        <ng-template #noCourses>
            <p class="empty-msg">You have no courses assigned.</p>
        </ng-template>
    </div>
</div>
<app-footer></app-footer>

<style>
html, body {
    height: 100%;
    margin: 0;
    padding: 0;
}
.fullscreen-bg {
    min-height: 100vh;
    min-width: 100vw;
    width: 100vw;
    height: 100vh;
    background: #f4f7fb;
    display: flex;
    align-items: center;
    justify-content: center;
}
.learning-container {
    max-width: 900px;
    width: 100%;
    background: #fff;
    border-radius: 18px;
    box-shadow: 0 8px 32px rgba(44, 62, 80, 0.15);
    padding: 32px 40px 24px 40px;
    animation: fadeIn 1s;
    min-height: 70vh;
    display: flex;
    flex-direction: column;
    align-items: center;
}
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(40px);}
    to { opacity: 1; transform: translateY(0);}
}
.learning-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    margin-bottom: 28px;
}
.learning-header h2 {
    font-size: 2rem;
    color: #2d3a4b;
    margin: 0;
    flex: 1;
    text-align: center;
    letter-spacing: 1px;
}
.header-spacer {
    width: 120px;
}
.back-btn {
    background: #e5e7eb;
    color: #2563eb;
    border: none;
    border-radius: 6px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    padding: 8px 18px;
    transition: background 0.2s, color 0.2s;
    box-shadow: none;
}
.back-btn:hover {
    background: #dbeafe;
    color: #1746a0;
}
.course-list {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 28px;
    width: 100%;
}
@media (max-width: 900px) {
    .learning-container {
        padding: 20px 8px;
    }
}
@media (max-width: 768px) {
    .course-list {
        grid-template-columns: 1fr;
    }
    .learning-container {
        padding: 16px 2px;
    }
}
.course-card {
    background: #f9fbfd;
    padding: 28px 22px 22px 22px;
    border-radius: 14px;
    box-shadow: 0 4px 18px rgba(44, 62, 80, 0.09);
    border: 1.5px solid #e5e7eb;
    transition: box-shadow 0.2s, border 0.2s, transform 0.2s;
    display: flex;
    flex-direction: column;
    min-height: 210px;
}
.course-card:hover {
    box-shadow: 0 8px 32px rgba(44, 62, 80, 0.15);
    border-color: #4f8cff;
    transform: translateY(-2px) scale(1.01);
}
.course-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
}
.course-card h3 {
    font-size: 1.18rem;
    color: #374151;
    font-weight: 600;
    margin: 0;
    letter-spacing: 0.5px;
}
.status {
    padding: 4px 14px;
    border-radius: 10px;
    font-weight: 600;
    font-size: 1rem;
    box-shadow: 0 1px 4px rgba(44, 62, 80, 0.07);
    text-transform: capitalize;
    border: 1px solid transparent;
}
.status.notstarted {
    background: #fffbe6;
    color: #b38f00;
    border-color: #ffe082;
}
.status.inprogress {
    background: #e0f0ff;
    color: #0077cc;
    border-color: #90caf9;
}
.status.completed {
    background: #e6f9e6;
    color: #1a7f37;
    border-color: #81c784;
}
.course-details {
    display: flex;
    gap: 32px;
    margin-bottom: 12px;
    font-size: 1.04rem;
    color: #2d3a4b;
}
.course-details .label {
    color: #4f8cff;
    font-weight: 500;
    margin-right: 4px;
}
.progress-bar {
    background: #e2e8f0;
    height: 12px;
    border-radius: 8px;
    overflow: hidden;
    margin: 14px 0 8px 0;
    box-shadow: 0 1px 4px rgba(44, 62, 80, 0.08);
}
.progress-bar .progress {
    height: 100%;
    background: linear-gradient(90deg, #4f8cff, #2563eb);
    transition: width 0.3s ease-in-out;
    border-radius: 8px 0 0 8px;
}
.actions {
    margin-top: 10px;
    display: flex;
    gap: 12px;
}
.actions button {
    background: linear-gradient(90deg, #2563eb 0%, #4f8cff 100%);
    color: #fff;
    border: none;
    padding: 10px 26px;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, box-shadow 0.2s, transform 0.1s;
    box-shadow: 0 2px 8px rgba(79,140,255,0.10);
    outline: none;
}
.actions button:active {
    transform: scale(0.97);
}
.actions button:hover {
    background: linear-gradient(90deg, #1746a0 0%, #2563eb 100%);
    box-shadow: 0 4px 16px rgba(79,140,255,0.18);
}
.empty-msg {
    text-align: center;
    color: #888;
    font-size: 1.15rem;
    margin-top: 28px;
    font-weight: 600;
}
</style>
